<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>IsiVoltPro · HUCSC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800;900&family=Barlow:wght@300;400;500&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --acc:  #2f7ef5;
    --acc2: #1a5fd4;
    --gold: #f5a623;
    --red:  #ff4455;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Barlow', sans-serif;
  }

  /* ── VIDEO BG ─────────────────────────────────────── */
  #bg-video {
    position: fixed; inset: 0; z-index: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    filter: brightness(.38) saturate(.6);
  }

  /* ── GRAIN OVERLAY ────────────────────────────────── */
  .grain {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    opacity: .045;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    animation: grain-move 0.4s steps(1) infinite;
  }
  @keyframes grain-move {
    0%  { background-position: 0 0; }
    25% { background-position: -50px 20px; }
    50% { background-position: 30px -40px; }
    75% { background-position: -20px 50px; }
  }

  /* ── VIGNETTE ─────────────────────────────────────── */
  .vignette {
    position: fixed; inset: 0; z-index: 2; pointer-events: none;
    background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 30%, rgba(0,0,0,.75) 100%);
  }

  /* ── SCAN LINE ────────────────────────────────────── */
  .scanline {
    position: fixed; inset: 0; z-index: 3; pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,.03) 2px,
      rgba(0,0,0,.03) 4px
    );
  }

  /* ── HORIZONTAL LINE ACCENT ───────────────────────── */
  .h-line {
    position: fixed; left: 0; right: 0; z-index: 4; pointer-events: none;
    height: 1px; background: linear-gradient(90deg, transparent, var(--acc), transparent);
    opacity: 0; animation: h-line-in 1s ease-out 1.8s forwards;
  }
  .h-line.top    { top: 18%; }
  .h-line.bottom { bottom: 18%; }
  @keyframes h-line-in { to { opacity: .35; } }

  /* ── CORNER MARKS ─────────────────────────────────── */
  .corner {
    position: fixed; z-index: 5; width: 28px; height: 28px;
    opacity: 0; animation: corner-in .6s ease-out forwards;
  }
  .corner::before, .corner::after {
    content: ''; position: absolute; background: var(--acc);
  }
  .corner::before { width: 100%; height: 1.5px; top: 0; left: 0; }
  .corner::after  { width: 1.5px; height: 100%; top: 0; left: 0; }
  .corner.tl { top: 24px; left: 24px; animation-delay: 1.6s; }
  .corner.tr { top: 24px; right: 24px; transform: scaleX(-1); animation-delay: 1.7s; }
  .corner.bl { bottom: 24px; left: 24px; transform: scaleY(-1); animation-delay: 1.8s; }
  .corner.br { bottom: 24px; right: 24px; transform: scale(-1,-1); animation-delay: 1.9s; }
  @keyframes corner-in { to { opacity: .7; } }

  /* ── MAIN CONTENT ─────────────────────────────────── */
  .splash {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 0 28px;
    text-align: center;
  }

  /* Línea técnica superior */
  .tech-line {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 3px;
    color: rgba(47,126,245,.7);
    text-transform: uppercase;
    opacity: 0; transform: translateY(-12px);
    animation: fade-up .7s ease-out 1.0s forwards;
    margin-bottom: 28px;
  }

  /* Logo mark */
  .logo-mark {
    width: 72px; height: 72px; border-radius: 20px;
    background: linear-gradient(135deg, var(--acc), var(--acc2));
    display: flex; align-items: center; justify-content: center;
    font-size: 34px; margin-bottom: 22px;
    box-shadow: 0 0 60px rgba(47,126,245,.4), 0 0 120px rgba(47,126,245,.15);
    opacity: 0; transform: scale(.7);
    animation: logo-in .8s cubic-bezier(.34,1.56,.64,1) 0.6s forwards;
    position: relative;
  }
  .logo-mark::after {
    content: '';
    position: absolute; inset: -8px; border-radius: 26px;
    border: 1px solid rgba(47,126,245,.3);
    animation: pulse-ring 2.5s ease-out 1.8s infinite;
  }
  @keyframes pulse-ring {
    0%   { transform: scale(1);    opacity: .6; }
    100% { transform: scale(1.35); opacity: 0; }
  }
  @keyframes logo-in {
    to { opacity: 1; transform: scale(1); }
  }

  /* Título principal */
  .title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(52px, 12vw, 88px);
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1;
    color: #fff;
    opacity: 0; transform: translateY(20px);
    animation: fade-up .8s ease-out 1.0s forwards;
    text-shadow: 0 0 80px rgba(47,126,245,.3);
  }
  .title .accent { color: var(--acc); }

  /* Subtítulo */
  .subtitle {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(14px, 4vw, 20px);
    font-weight: 300;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(255,255,255,.45);
    margin-top: 10px;
    opacity: 0; transform: translateY(14px);
    animation: fade-up .7s ease-out 1.2s forwards;
  }

  /* Tags de módulos */
  .modules {
    display: flex; gap: 8px; flex-wrap: wrap;
    justify-content: center; margin-top: 28px;
    opacity: 0;
    animation: fade-up .7s ease-out 1.5s forwards;
  }
  .mod-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 1.5px;
    color: rgba(255,255,255,.4);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 4px; padding: 5px 10px;
    text-transform: uppercase;
    background: rgba(255,255,255,.03);
    backdrop-filter: blur(4px);
  }
  .mod-tag.hi {
    color: var(--acc); border-color: rgba(47,126,245,.4);
    background: rgba(47,126,245,.08);
  }

  /* Divider */
  .divider {
    width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--acc), transparent);
    margin: 30px auto 0;
    opacity: 0; animation: fade-up .6s ease-out 1.7s forwards;
  }

  /* Hospital badge */
  .hospital {
    margin-top: 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 2px;
    color: rgba(255,255,255,.25); text-transform: uppercase;
    opacity: 0; animation: fade-up .6s ease-out 1.8s forwards;
  }
  .hospital span { color: rgba(255,255,255,.5); }

  /* ── BARRA DE CARGA ───────────────────────────────── */
  .loader-wrap {
    position: fixed; bottom: 60px; left: 50%;
    transform: translateX(-50%);
    z-index: 11; width: min(320px, 80vw);
    opacity: 0; animation: fade-up .6s ease-out 2.0s forwards;
  }
  .loader-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 2px;
    color: rgba(47,126,245,.6); text-transform: uppercase;
    margin-bottom: 8px; display: flex;
    justify-content: space-between;
  }
  .loader-track {
    height: 2px; background: rgba(255,255,255,.08);
    border-radius: 999px; overflow: hidden;
  }
  .loader-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--acc2), var(--acc), #7ab8ff);
    border-radius: 999px;
    width: 0;
    animation: load-fill 2.5s cubic-bezier(.4,0,.2,1) 2.2s forwards;
    box-shadow: 0 0 12px rgba(47,126,245,.8);
  }
  @keyframes load-fill { to { width: 100%; } }

  /* ── ENTER BUTTON ─────────────────────────────────── */
  .enter-btn {
    position: fixed; bottom: 48px; left: 50%;
    transform: translateX(-50%);
    z-index: 12;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px; font-weight: 700;
    letter-spacing: 4px; text-transform: uppercase;
    color: #fff;
    background: linear-gradient(135deg, var(--acc), var(--acc2));
    border: none; border-radius: 6px;
    padding: 14px 36px;
    box-shadow: 0 0 40px rgba(47,126,245,.4);
    cursor: pointer;
    opacity: 0; pointer-events: none;
    transition: transform .18s, box-shadow .18s;
    white-space: nowrap;
  }
  .enter-btn.show {
    animation: btn-appear .6s ease-out forwards;
    pointer-events: auto;
  }
  .enter-btn:active { transform: translateX(-50%) scale(.97); }
  @keyframes btn-appear {
    from { opacity: 0; transform: translateX(-50%) translateY(10px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* ── VERSIÓN ──────────────────────────────────────── */
  .version {
    position: fixed; bottom: 16px; right: 20px; z-index: 11;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; color: rgba(255,255,255,.18);
    letter-spacing: 1px;
    opacity: 0; animation: fade-up .5s ease-out 2.5s forwards;
  }

  /* ── SALIDA ───────────────────────────────────────── */
  body.exit { animation: exit-flash .5s ease-out forwards; }
  @keyframes exit-flash {
    0%   { opacity: 1; }
    40%  { opacity: 1; filter: brightness(1.6); }
    100% { opacity: 0; filter: brightness(0); }
  }

  @keyframes fade-up {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── STATUS DOTS ──────────────────────────────────── */
  .status-row {
    position: fixed; top: 20px; right: 24px; z-index: 11;
    display: flex; gap: 6px; align-items: center;
    opacity: 0; animation: fade-up .5s ease-out 2.2s forwards;
  }
  .s-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--acc);
    box-shadow: 0 0 6px var(--acc);
    animation: blink 2s ease-in-out infinite;
  }
  .s-dot:nth-child(2) { animation-delay: .4s; background: #00d084; box-shadow: 0 0 6px #00d084; }
  .s-dot:nth-child(3) { animation-delay: .8s; background: var(--gold); box-shadow: 0 0 6px var(--gold); }
  @keyframes blink {
    0%,100% { opacity: 1; } 50% { opacity: .25; }
  }

  /* ── SIDE COORDINATES ─────────────────────────────── */
  .coords {
    position: fixed; left: 24px; bottom: 100px; z-index: 11;
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px; letter-spacing: 1px;
    color: rgba(255,255,255,.18);
    writing-mode: vertical-rl; text-orientation: mixed;
    opacity: 0; animation: fade-up .5s ease-out 2.3s forwards;
  }

  /* ── VIDEO UPLOAD ─────────────────────────────────── */
  .video-tools {
    position: fixed;
    left: 20px;
    top: 20px;
    z-index: 20;
    display: flex;
    gap: 8px;
    opacity: 0;
    animation: fade-up .5s ease-out 2.2s forwards;
  }
  .tool-btn {
    border: 1px solid rgba(47,126,245,.45);
    background: rgba(3,9,18,.78);
    color: #cde2ff;
    padding: 7px 10px;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: .5px;
    cursor: pointer;
    backdrop-filter: blur(8px);
  }
  .tool-btn:hover { background: rgba(47,126,245,.16); }
  #video-file-input { display: none; }

  /* ── RESPONSIVE ───────────────────────────────────── */
  @media (max-width: 420px) {
    .logo-mark { width: 60px; height: 60px; font-size: 28px; }
    .modules { gap: 6px; }
    .mod-tag { font-size: 8px; padding: 4px 8px; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
  </style>
</head>
<body>

  <!-- Vídeo de fondo -->
  <video id="bg-video" autoplay muted loop playsinline aria-label="Vídeo de fondo">
    <source src="intro.mp4" type="video/mp4">
  </video>

  <!-- Herramientas de vídeo -->
  <div class="video-tools">
    <button class="tool-btn" id="upload-video-btn" type="button" aria-label="Subir vídeo de introducción">Subir vídeo intro</button>
    <button class="tool-btn" id="reset-video-btn" type="button" aria-label="Restaurar vídeo de introducción">Restaurar</button>
    <button class="tool-btn" id="toggle-sound-btn" type="button" aria-label="Activar o desactivar sonido">🔇 Sonido OFF</button>
    <input id="video-file-input" type="file" accept="video/mp4,video/webm,video/ogg">
  </div>

  <!-- Efectos de capa -->
  <div class="grain"></div>
  <div class="vignette"></div>
  <div class="scanline"></div>
  <div class="h-line top"></div>
  <div class="h-line bottom"></div>

  <!-- Esquinas técnicas -->
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <!-- Puntos de estado -->
  <div class="status-row">
    <div class="s-dot"></div>
    <div class="s-dot"></div>
    <div class="s-dot"></div>
  </div>

  <!-- Coordenadas decorativas -->
  <div class="coords">37.1773° N · 3.5986° W · GRANADA</div>

  <!-- Contenido principal -->
  <div class="splash">
    <div class="tech-line">Sistema de gestión · v1.0 · 2026</div>

    <div class="logo-mark">⚡</div>

    <div class="title">ISI<span class="accent">VOLT</span><br>PRO</div>
    <div class="subtitle">Hospital Universitario · San Cecilio</div>

    <div class="modules">
      <span class="mod-tag hi">Informes</span>
      <span class="mod-tag hi">OT</span>
      <span class="mod-tag hi">Historial</span>
      <span class="mod-tag">Instalaciones</span>
      <span class="mod-tag">Estadísticas</span>
      <span class="mod-tag">GitHub Sync</span>
    </div>

    <div class="divider"></div>
    <div class="hospital">Servicio de <span>Mantenimiento</span> · HUCSC</div>
  </div>

  <!-- Barra de carga -->
  <div class="loader-wrap" id="loader-wrap">
    <div class="loader-label">
      <span>Iniciando sistema</span>
      <span id="pct">0%</span>
    </div>
    <div class="loader-track">
      <div class="loader-bar" id="loader-bar"></div>
    </div>
  </div>

  <!-- Botón de entrada -->
  <button class="enter-btn" id="enter-btn" onclick="enterApp()" aria-label="Acceder al sistema">
    Acceder al sistema →
  </button>

  <!-- Versión -->
  <div class="version">IVP v1.0 · HUCSC · 2026</div>

<script>
  const STORAGE_KEY = 'ivp-intro-video-dataurl';
  const INTRO_SOUND_KEY = 'ivp_intro_sound_enabled';
  const SESSION_KEY = 'ivp_session_active';
  const bgVideo = document.getElementById('bg-video');
  const uploadBtn = document.getElementById('upload-video-btn');
  const resetBtn = document.getElementById('reset-video-btn');
  const soundBtn = document.getElementById('toggle-sound-btn');
  const fileInput = document.getElementById('video-file-input');

  function setVideoSource(videoSrc) {
    if (!bgVideo) return;
    bgVideo.src = videoSrc;
    bgVideo.load();
    bgVideo.play().catch(() => {});
  }

  function loadSavedVideo() {
    try {
      const savedVideo = localStorage.getItem(STORAGE_KEY);
      if (savedVideo) setVideoSource(savedVideo);
    } catch (_) {}
  }

  function handleVideoUpload(event) {
    const file = event.target.files?.[0];
    if (!file) return;
    if (!file.type.startsWith('video/')) {
      alert('Selecciona un archivo de vídeo válido.');
      return;
    }
    const reader = new FileReader();
    reader.onload = () => {
      const result = reader.result;
      if (typeof result !== 'string') return;
      try {
        localStorage.setItem(STORAGE_KEY, result);
        setVideoSource(result);
      } catch (_) {
        alert('El vídeo es demasiado grande para guardarlo en el navegador. Usa uno más corto o comprimido.');
      }
    };
    reader.readAsDataURL(file);
  }

  function resetVideoToDefault() {
    try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}
    setVideoSource('intro.mp4');
  }

  function updateSoundButton() {
    if (!soundBtn || !bgVideo) return;
    soundBtn.textContent = bgVideo.muted ? '🔇 Sonido OFF' : '🔊 Sonido ON';
  }

  function applySavedSoundPreference() {
    let enabled = false;
    try { enabled = localStorage.getItem(INTRO_SOUND_KEY) === '1'; } catch (_) {}
    if (bgVideo) bgVideo.muted = !enabled;
    updateSoundButton();
  }

  function toggleIntroSound() {
    if (!bgVideo) return;
    bgVideo.muted = !bgVideo.muted;
    try { localStorage.setItem(INTRO_SOUND_KEY, bgVideo.muted ? '0' : '1'); } catch (_) {}
    bgVideo.play().catch(() => {});
    updateSoundButton();
  }

  uploadBtn?.addEventListener('click', () => fileInput?.click());
  fileInput?.addEventListener('change', handleVideoUpload);
  resetBtn?.addEventListener('click', resetVideoToDefault);
  soundBtn?.addEventListener('click', toggleIntroSound);
  loadSavedVideo();
  applySavedSoundPreference();

  // Contador de progreso
  let pct = 0;
  const pctEl = document.getElementById('pct');
  const interval = setInterval(() => {
    pct = Math.min(100, pct + Math.random() * 4 + 1);
    if (pctEl) pctEl.textContent = Math.floor(pct) + '%';
    if (pct >= 100) {
      clearInterval(interval);
      if (pctEl) pctEl.textContent = '100%';
      // Mostrar botón, ocultar barra
      setTimeout(() => {
        const lw = document.getElementById('loader-wrap');
        const btn = document.getElementById('enter-btn');
        if (lw) { lw.style.transition = 'opacity .4s'; lw.style.opacity = '0'; }
        setTimeout(() => {
          if (lw) lw.style.display = 'none';
          if (btn) btn.classList.add('show');
        }, 400);
      }, 300);
    }
  }, 65);

  // Entrar a la app
  function enterApp() {
    try { localStorage.setItem(SESSION_KEY, '1'); } catch (_) {}
    document.body.classList.add('exit');
    setTimeout(() => {
      // Redirige al archivo principal de la app
      window.location.href = 'app.html';
    }, 500);
  }

  // También permite entrar tocando la pantalla después de cargar
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') {
      const btn = document.getElementById('enter-btn');
      if (btn && btn.classList.contains('show')) enterApp();
    }
  });
</script>

</body>
</html>
